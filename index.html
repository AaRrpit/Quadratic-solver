<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quadratic Equation Solver</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="glass-card">
        <h1>Quadratic Solver</h1>
        <p class="subtitle">Enter values for: ax² + bx + c = 0</p>

        <div class="input-container">
            <div class="input-box">
                <label>Value of a</label>
                <input type="number" id="a" placeholder="0" required>
            </div>
            <div class="input-box">
                <label>Value of b</label>
                <input type="number" id="b" placeholder="0" required>
            </div>
            <div class="input-box">
                <label>Value of c</label>
                <input type="number" id="c" placeholder="0" required>
            </div>
        </div>

        <div class="action-buttons">
            <button class="btn-calc" onclick="handleSolve()">Solve Equation</button>
            <button class="btn-reset" onclick="resetAll()">Reset</button>
        </div>

        <div id="loader" class="loader hidden">
            <div class="orbit"></div>
            <p>Calculating Roots...</p>
        </div>

        <div id="results" class="results-box hidden">
            <h3>Calculated Roots:</h3>
            <div class="root-display">
                <p id="root1"></p>
                <p id="root2"></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
